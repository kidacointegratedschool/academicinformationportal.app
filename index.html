<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KIS Academic Information Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* Reset and prevent scrolling on the parent wrapper */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Removes the scrollbar */
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Container fills the entire viewport */
        .app-container {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            position: relative;
        }

        /* Iframe fills the container perfectly */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Removed constraints for larger screens to maintain full-screen view */
        @media (min-width: 769px) {
            .app-container {
                max-width: none; 
                height: 100vh;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxOoxydIArLjREWTunPQsnLp6HhFwImiBV9is8BOqzV6IWSpBvZ0lseP2srvPTISDyc/exec" 
        allow="geolocation; microphone; camera">
    </iframe>
</div>

</body>
</html>
