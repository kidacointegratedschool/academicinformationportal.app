<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KIS Student Academic Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* 1. Hide scrollbar for Chrome, Safari and Opera */
        *::-webkit-scrollbar {
            display: none;
        }

        /* 2. Hide scrollbar for IE, Edge and Firefox */
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents the main page from scrolling */
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-width: 480px; 
            margin: 0 auto;
            background-color: #ffffff;
            position: relative;
            overflow: hidden; /* Ensures no scrollbars on the container */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            /* Extra insurance to hide scrollbars inside the iframe */
            overflow: hidden; 
        }

        @media (min-width: 769px) {
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #ffffff; 
            }
            .app-container {
                height: 95vh;
                border: 1px solid #eee;
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxOoxydIArLjREWTunPQsnLp6HhFwImiBV9is8BOqzV6IWSpBvZ0lseP2srvPTISDyc/exec" 
        allow="geolocation; microphone; camera"
        scrolling="no"> </iframe>
</div>

</body>
</html>
