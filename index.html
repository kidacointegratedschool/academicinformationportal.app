<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KIS Academic Information Portal</title>
    
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1Ku01W6j1sLlJsLX3j3iyBJvjIIdcozAP">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app-container {
            width: 100vw;
            height: 150vh;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 150%;
            border: none;
            display: block;
        }

        @media (min-width: 769px) {
            .app-container {
                max-width: none; 
                height: 150vh;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxOoxydIArLjREWTunPQsnLp6HhFwImiBV9is8BOqzV6IWSpBvZ0lseP2srvPTISDyc/exec" 
        allow="geolocation; microphone; camera">
    </iframe>
</div>

</body>
</html>
